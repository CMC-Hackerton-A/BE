spring:
  application:
    name: Neodinary_hackaton
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
  profiles:
    active:
      dev
    group:
      local-env:
        - local
      dev-env:
        - dev
external:
  spotify:
    client-id: ${SPOTIFY_CLIENT_ID}
    client-secret: ${SPOTIFY_CLIENT_SECRET}
  musicbrainz:
    user-agent: NeodinaryHackaton/1.0.0 (your-email@example.com)
